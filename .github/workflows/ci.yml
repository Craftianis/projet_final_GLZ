name: DevSecOps CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "ci/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  BACKEND_DIR: backend
  IMAGE_LOCAL_NAME: secwallet-backend:ci

jobs:
  backend-ci:
    name: Backend quality and security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: npm ci

      - name: Run backend tests if present
        working-directory: ${{ env.BACKEND_DIR }}
        run: npm test --if-present

      - name: Run npm security audit
        working-directory: ${{ env.BACKEND_DIR }}
        run: npm audit --audit-level=high

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: security/gitleaks/gitleaks.toml

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_LOCAL_NAME }} ./backend

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_LOCAL_NAME }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          scanners: vuln
          skip-dirs: /usr/local/lib/node_modules/npm

      - name: Generate SBOM CycloneDX with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_LOCAL_NAME }}
          format: cyclonedx
          output: sbom.cdx.json
          scanners: vuln
          skip-dirs: /usr/local/lib/node_modules/npm

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v5
        with:
          name: backend-sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: error

  publish-ghcr:
    name: Publish backend image to GHCR
    runs-on: ubuntu-latest
    needs: backend-ci

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Prepare lowercase image name
        id: image
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_LOWER=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=ghcr.io/${OWNER_LOWER}/${REPO_LOWER}/backend" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.image.outputs.image_name }}:latest
            ${{ steps.image.outputs.image_name }}:${{ github.sha }}
