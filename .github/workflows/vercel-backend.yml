name: Deploy Backend to Vercel

on:
  push:
    branches:
      - main
      - "ci/**"
    paths:
      - "backend/**"
      - ".github/workflows/vercel-backend.yml"

  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/vercel-backend.yml"

  workflow_dispatch:

permissions:
  contents: read

env:
  BACKEND_DIR: backend

jobs:
  vercel-backend-check:
    name: Validate backend before Vercel deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: npm ci

      - name: Run backend tests
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          DATABASE_URL: postgres://example
          JWT_SECRET: dev-placeholder
        run: npm test --if-present

  deploy-backend-preview:
    name: Deploy backend preview to Vercel
    runs-on: ubuntu-latest
    needs: vercel-backend-check

    if: github.event_name != 'pull_request' && github.ref != 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        working-directory: ${{ env.BACKEND_DIR }}
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy preview to Vercel
        working-directory: ${{ env.BACKEND_DIR }}
        run: vercel deploy --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-backend-production:
    name: Deploy backend production to Vercel
    runs-on: ubuntu-latest
    needs: vercel-backend-check

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        working-directory: ${{ env.BACKEND_DIR }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy production to Vercel
        id: vercel_production
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Deployment URL: $DEPLOYMENT_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Test production health endpoint
        run: |
          HEALTH_URL="${{ steps.vercel_production.outputs.deployment_url }}/api/health"
          echo "Testing $HEALTH_URL"
          curl --fail --show-error --silent "$HEALTH_URL"
# trigger

