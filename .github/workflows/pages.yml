name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/pages.yml"

  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/pages.yml"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  validate-frontend:
    name: Validate frontend files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check frontend entrypoint
        run: test -f frontend/index.html

      - name: Check no frontend env files
        run: |
          if find frontend -name ".env" -o -name ".env.*" | grep .; then
            echo "Sensitive frontend environment file detected."
            exit 1
          fi

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: validate-frontend

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload frontend artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
